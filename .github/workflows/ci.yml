name: CI

on:
  push:
    branches:
      - main

  pull_request:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: Install Server Dependencies
        run: |
          cd server
          npm ci

      - name: Run Server Tests
        run: |
          cd server
          npm test

      - name: Install Client Dependencies
        run: |
          cd client
          npm ci

      - name: Run Client Tests
        run: |
          cd client
          npm test